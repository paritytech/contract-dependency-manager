name: Deploy Frontend

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: deploy-frontend-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Deploy contracts.dot
              run: src/lib/scripts/deploy-frontend.sh "$CDM_DEPLOY_SURI"
              env:
                  CDM_DEPLOY_SURI: ${{ secrets.MNEMONIC }}
