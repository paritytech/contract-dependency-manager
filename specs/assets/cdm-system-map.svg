<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="-apple-system, system-ui, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background (white with rounded corners — convention for all CDM spec diagrams) -->
  <rect x="0" y="0" width="1100" height="760" rx="16" ry="16" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#111">CDM: name → cid → install → consume</text>

  <!-- ===== AUTHOR (top-left) ===== -->
  <rect x="40" y="80" width="260" height="70" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="170" y="108" text-anchor="middle" font-weight="600" fill="#92400E">Contract author</text>
  <text x="170" y="130" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#92400E">#[pvm::contract(cdm = "@org/foo")]</text>

  <rect x="60" y="190" width="220" height="50" rx="10" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>
  <text x="170" y="220" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#92400E">cdm deploy -n paseo</text>

  <!-- arrow author -> deploy -->
  <line x1="170" y1="150" x2="170" y2="188" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ON-CHAIN STATE (center) ===== -->
  <rect x="380" y="160" width="340" height="280" rx="14" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="550" y="184" text-anchor="middle" font-weight="700" fill="#1E3A8A" font-size="13" letter-spacing="1">ON-CHAIN STATE</text>

  <!-- ContractRegistry -->
  <rect x="410" y="210" width="280" height="100" rx="10" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="2"/>
  <text x="550" y="232" text-anchor="middle" font-weight="700" fill="#1E3A8A">ContractRegistry (Asset Hub)</text>
  <line x1="430" y1="244" x2="670" y2="244" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="550" y="264" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#1E3A8A">"@org/foo"  →  0xABC…</text>
  <text x="550" y="284" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#1E3A8A">"@org/foo"  →  cid:bafy…</text>

  <!-- Bulletin -->
  <rect x="410" y="335" width="280" height="85" rx="10" fill="#E0E7FF" stroke="#4338CA" stroke-width="2"/>
  <text x="550" y="357" text-anchor="middle" font-weight="700" fill="#312E81">Bulletin (content-addressed)</text>
  <line x1="430" y1="369" x2="670" y2="369" stroke="#4338CA" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="550" y="390" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#312E81">cid:bafy…  →  { abi, readme,</text>
  <text x="550" y="408" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#312E81">authors, repo, … }</text>

  <!-- registry -> bulletin (dotted reference) -->
  <line x1="550" y1="310" x2="550" y2="333" stroke="#888" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowDashed)"/>
  <text x="565" y="326" font-size="11" font-style="italic" fill="#666">metadataCid</text>

  <!-- deploy -> registry -->
  <path d="M 280 215 C 340 215, 360 245, 410 250" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="335" y="208" font-size="11" fill="#333">publish_latest</text>

  <!-- deploy -> bulletin -->
  <path d="M 280 230 C 320 320, 340 370, 410 380" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="290" y="318" font-size="11" fill="#333">upload metadata</text>

  <!-- ===== CONSUMER (right side) ===== -->
  <rect x="800" y="80" width="260" height="50" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="2"/>
  <text x="930" y="110" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#14532D">cdm install -n paseo @org/foo</text>

  <!-- registry -> install -->
  <path d="M 690 250 C 740 230, 780 160, 800 110" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="755" y="195" font-size="11" fill="#333">name → addr, cid</text>

  <!-- bulletin -> install -->
  <path d="M 690 380 C 760 380, 800 200, 870 132" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="780" y="295" font-size="11" fill="#333">cid → blob</text>

  <!-- Project-local artifacts -->
  <rect x="780" y="170" width="300" height="100" rx="10" fill="#F0FDF4" stroke="#15803D" stroke-width="2"/>
  <text x="930" y="192" text-anchor="middle" font-weight="700" fill="#14532D">project .cdm/ + cdm.json</text>
  <line x1="800" y1="204" x2="1060" y2="204" stroke="#15803D" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="930" y="224" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#14532D">.cdm/contracts/@org/foo/v/</text>
  <text x="930" y="242" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#14532D">├── abi.json</text>
  <text x="930" y="259" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#14532D">└── metadata.json</text>

  <!-- install -> cache -->
  <line x1="930" y1="130" x2="930" y2="168" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- cache -> ts (drawn BEFORE Rust box so it tucks behind it where it crosses) -->
  <path d="M 980 270 C 1010 320, 1010 400, 990 428" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Rust consumer -->
  <rect x="780" y="320" width="300" height="80" rx="10" fill="#FFE4E6" stroke="#BE123C" stroke-width="2"/>
  <text x="930" y="342" text-anchor="middle" font-weight="700" fill="#881337">Rust contract</text>
  <text x="930" y="364" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#881337">cdm::import!("@org/foo");</text>
  <text x="930" y="384" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#881337">foo::cdm_reference()</text>

  <!-- TS consumer -->
  <rect x="780" y="430" width="300" height="80" rx="10" fill="#FFF1F2" stroke="#BE123C" stroke-width="2"/>
  <text x="930" y="450" text-anchor="middle" font-weight="700" fill="#881337">TypeScript</text>
  <text x="930" y="466" text-anchor="middle" font-size="10" fill="#9F1239">@parity/product-sdk-contracts</text>
  <text x="930" y="486" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#881337">manager.getContract("@org/foo")</text>
  <text x="930" y="503" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#881337">.increment.tx()</text>

  <!-- cache -> rust -->
  <path d="M 880 270 C 855 290, 850 305, 870 318" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Stage labels ===== -->
  <text x="170" y="64" text-anchor="middle" fill="#92400E" letter-spacing="1"><tspan font-size="22" font-weight="800">①</tspan><tspan font-size="14" font-weight="700"> PUBLISH</tspan></text>
  <text x="550" y="64" text-anchor="middle" fill="#1E3A8A" letter-spacing="1"><tspan font-size="22" font-weight="800">②</tspan><tspan font-size="14" font-weight="700"> STORE</tspan></text>
  <text x="930" y="64" text-anchor="middle" fill="#14532D" letter-spacing="1"><tspan font-size="22" font-weight="800">③</tspan><tspan font-size="14" font-weight="700"> INSTALL</tspan></text>
  <text x="930" y="306" text-anchor="middle" fill="#881337" letter-spacing="1"><tspan font-size="22" font-weight="800">④</tspan><tspan font-size="14" font-weight="700"> CONSUME</tspan></text>

  <!-- Legend -->
  <g transform="translate(40, 640)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#333">Legend</text>
    <line x1="0" y1="20" x2="40" y2="20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="50" y="24" font-size="12" fill="#333">data flow / action</text>
    <line x1="200" y1="20" x2="240" y2="20" stroke="#888" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowDashed)"/>
    <text x="250" y="24" font-size="12" fill="#333">reference (stored pointer)</text>

    <rect x="0" y="40" width="20" height="14" fill="#FEF3C7" stroke="#D97706"/>
    <text x="28" y="52" font-size="12" fill="#333">author / publish</text>
    <rect x="160" y="40" width="20" height="14" fill="#DBEAFE" stroke="#1D4ED8"/>
    <text x="188" y="52" font-size="12" fill="#333">on-chain state</text>
    <rect x="320" y="40" width="20" height="14" fill="#DCFCE7" stroke="#15803D"/>
    <text x="348" y="52" font-size="12" fill="#333">consumer machine</text>
    <rect x="500" y="40" width="20" height="14" fill="#FFE4E6" stroke="#BE123C"/>
    <text x="528" y="52" font-size="12" fill="#333">consumer code</text>
  </g>
</svg>
